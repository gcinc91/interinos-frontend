name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm run test

      - name: Build (vite)
        run: npm run build
